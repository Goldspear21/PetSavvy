<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rescued Animals</title>
    <style>
        :root {
            --accent: #E5E4E2;
            --dark: #111;
            --border: 2px solid #111;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f9f9f9;
            padding: 40px 20px;
            color: var(--dark);
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* Inventory Header Styling */
        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: var(--border);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .home-link { text-decoration: none; color: var(--dark); font-weight: bold; margin-bottom: 10px; display: inline-block; }

        .top-bar { display: flex; gap: 15px; margin-bottom: 20px; }
        #search { flex: 1; padding: 10px; border: var(--border); }

        /* Sort Bar Styling */
        .sort-bar {
            background: var(--accent);
            padding: 10px;
            border: var(--border);
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            font-size: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .sort-bar button {
            background: white; border: 1px solid var(--dark);
            padding: 4px 10px; cursor: pointer; font-weight: bold;
            text-transform: uppercase;
        }

        /* Record Card Styling */
        #rescuedTableBody { display: flex; flex-direction: column; gap: 15px; }

        .rescue-record-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border: var(--border);
            padding: 15px 25px;
            transition: 0.2s;
        }

        .rescue-record-row:hover { background: #fffdf5; }

        .info-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 20px; flex: 1; }
        .info-item strong { display: block; font-size: 0.65rem; color: #777; text-transform: uppercase; margin-bottom: 4px; }
        .info-item span { font-weight: 500; font-size: 0.95rem; }

        /* Gallery Spotlight Section */
        .gallery-section {
            margin-top: 80px;
            padding-top: 40px;
            border-top: var(--border);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .gallery-item {
            border: var(--border);
            background: white;
            position: relative;
            cursor: pointer;
        }

        .gallery-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            border-bottom: var(--border);
            filter: grayscale(20%);
            transition: filter 0.3s ease;
        }

        .gallery-item:hover .gallery-img { filter: grayscale(0%); }

        .empty-image-slot {
            height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
            color: #888;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: var(--border);
        }

        .empty-image-slot::before { content: '+'; font-size: 2rem; margin-bottom: 5px; }

        .gallery-name {
            padding: 10px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            background: var(--accent);
            text-align: center;
        }

        /* Reusable Buttons */
        .btn-primary { background: var(--dark); color: white; border: var(--border); padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .btn-warning { background: #ffcc00; border: 1px solid #111; cursor: pointer; padding: 5px 12px; font-weight: bold; }
        .btn-danger { background: #ff4444; border: 1px solid #111; color: white; cursor: pointer; padding: 5px 12px; font-weight: bold; }
        .image-input { display: none; }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="home-link">← HOME</a>

    <div class="inventory-header">
        <h1>RESCUED ANIMALS</h1>
        <a href="rescued_form.html"><button class="btn-primary">ADD RESCUED ANIMAL</button></a>
    </div>

    <div class="top-bar">
        <input type="text" id="search" placeholder="Search by name...">
    </div>

    <div class="sort-bar">
        <strong>SORT BY:</strong>
        <button id="sortBtnTagid">Tag ID</button>
        <button id="sortBtnRescueName">Name</button>
        <button id="sortBtnRescueLocation">Location</button>
        <button id="sortBtnRescueDate">Date</button>
        <button id="sortBtnSpecies">Species</button>
        <button id="sortBtnVaccineStatus">Vaccinated</button>
    </div>

    <div id="rescuedTableBody"></div>

    <div class="gallery-section">
        <h2>RESCUE SPOTLIGHT</h2>
        <div id="rescueGallery" class="gallery-grid"></div>
    </div>
</div>

<script>
    let allRescued = [];
    let sortState = { field: 'tagID', ascending: true };

    async function loadRescuedT() {
        const response = await fetch('/api/RescuedAnimals');
        allRescued = await response.json();
        sortState = { field: 'tagID', ascending: true };
        sortAndShow(allRescued);
    }

    async function showRescuedAnimals(rescued) {
        let html = '';
        for (let rescue of rescued) {
            html += `
            <div class="rescue-record-row">
                <div class="info-group">
                    <div class="info-item"><strong>Tag ID</strong><span>${rescue.tagID}</span></div>
                    <div class="info-item"><strong>Name</strong><span>${rescue.rescuedName}</span></div>
                    <div class="info-item"><strong>Location</strong><span>${rescue.rescueLocation}</span></div>
                    <div class="info-item"><strong>Date</strong><span>${rescue.rescueDate}</span></div>
                    <div class="info-item"><strong>Species</strong><span>${rescue.species}</span></div>
                    <div class="info-item"><strong>Vax</strong><span>${rescue.vaccination ? 'Yes' : 'No'}</span></div>
                </div>
                <div class="actions">
                    <a href="rescued_form.html?id=${rescue.tagID}"><button class="btn-warning">Edit</button></a>
                    <button class="btn-danger" onclick="deleteRescue(${rescue.tagID})">Delete</button>
                </div>
            </div>`;
        }
        document.getElementById('rescuedTableBody').innerHTML = html;
        showGallery(rescued);
    }

    function showGallery(rescued) {
        let galleryHtml = '';

        // Curated set of 5 rescue-themed images
        const defaultImages = {
            'dog': 'https://images.unsplash.com/photo-1583337130417-3346a1be7dee?auto=format&fit=crop&w=300&q=80',
            'cat': 'https://images.unsplash.com/photo-1548546738-8509cb246ed3?auto=format&fit=crop&w=300&q=80',
            'bird': 'https://images.unsplash.com/photo-1555169062-013468b47731?q=80&w=687&auto=format&fit=crop',
            'rabbit': 'https://images.unsplash.com/photo-1585110396000-c9ffd4e4b308?auto=format&fit=crop&w=300&q=80',
            'horse': 'https://images.unsplash.com/photo-1553284965-83fd3e82fa5a?auto=format&fit=crop&w=300&q=80'
        };

        rescued.forEach(rescue => {
            const savedImage = localStorage.getItem(`rescue_image_${rescue.tagID}`);
            let displayContent = '';
            const speciesKey = rescue.species.toLowerCase();

            if (savedImage) {
                displayContent = `<img src="${savedImage}" class="gallery-img">`;
            } else if (rescue.tagID <= 5 && defaultImages[speciesKey]) {
                displayContent = `<img src="${defaultImages[speciesKey]}" class="gallery-img">`;
            } else {
                displayContent = `<div class="empty-image-slot">Add Photo</div>`;
            }

            galleryHtml += `
        <div class="gallery-item" onclick="document.getElementById('input-${rescue.tagID}').click()">
            ${displayContent}
            <div class="gallery-name">${rescue.rescuedName}</div>
            <input type="file" id="input-${rescue.tagID}" class="image-input" accept="image/*" onchange="handleImageUpload(event, ${rescue.tagID})">
        </div>`;
        });
        document.getElementById('rescueGallery').innerHTML = galleryHtml;
    }

    function handleImageUpload(event, tagID) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem(`rescue_image_${tagID}`, e.target.result);
                showGallery(allRescued);
            };
            reader.readAsDataURL(file);
        }
    }

    function sortRescuedAnimals(field) {
        if (sortState.field === field) {
            sortState.ascending = !sortState.ascending;
        } else {
            sortState.field = field;
            sortState.ascending = true;
        }
        sortAndShow(allRescued);
    }

    function sortAndShow(rescued) {
        rescued.sort((a, b) => {
            let aVal = a[sortState.field];
            let bVal = b[sortState.field];
            if (typeof aVal === 'string') {
                aVal = aVal.toLowerCase(); bVal = bVal.toLowerCase();
                return sortState.ascending ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
            } else {
                return sortState.ascending ? aVal - bVal : bVal - aVal;
            }
        });
        showRescuedAnimals(rescued);
    }

    async function deleteRescue(id) {
        if(confirm('Are you sure you want to delete this record?')) {
            await fetch(`/api/RescuedAnimals/${id}`, {method: 'DELETE'});
            loadRescuedT();
        }
    }

    document.getElementById('sortBtnTagid').addEventListener('click', () => sortRescuedAnimals('tagID'));
    document.getElementById('sortBtnRescueName').addEventListener('click', () => sortRescuedAnimals('rescuedName'));
    document.getElementById('sortBtnRescueLocation').addEventListener('click', () => sortRescuedAnimals('rescueLocation'));
    document.getElementById('sortBtnRescueDate').addEventListener('click', () => sortRescuedAnimals('rescueDate'));
    document.getElementById('sortBtnSpecies').addEventListener('click', () => sortRescuedAnimals('species'));
    document.getElementById('sortBtnVaccineStatus').addEventListener('click', () => sortRescuedAnimals('vaccination'));

    document.getElementById('search').addEventListener('keyup', async (e) => {
        const res = await fetch(`/api/RescuedAnimals/search/name?name=${e.target.value}`);
        allRescued = await res.json();
        sortAndShow(allRescued);
    });

    loadRescuedT();
</script>
</body>
</html>
