<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Database</title>
  <style>
    :root {
      --accent: #E5E4E2;
      --dark: #111;
      --border: 2px solid #111;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      padding: 40px 20px;
      color: var(--dark);
    }

    .container { max-width: 1100px; margin: 0 auto; }

    /* Header Styling */
    .inventory-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: var(--border);
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    .home-link { text-decoration: none; color: var(--dark); font-weight: bold; margin-bottom: 10px; display: inline-block; }

    /* Top Bar & Search */
    .top-bar { display: flex; gap: 15px; margin-bottom: 20px; }
    #search {
      flex: 1;
      padding: 12px;
      border: var(--border);
      font-family: inherit;
    }

    /* Sort Bar */
    .sort-bar {
      background: var(--accent);
      padding: 10px;
      border: var(--border);
      margin-bottom: 30px;
      display: flex;
      gap: 10px;
      font-size: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .sort-bar button {
      background: white;
      border: 1px solid var(--dark);
      padding: 5px 12px;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      transition: 0.2s;
    }

    .sort-bar button:hover {
      background: var(--dark);
      color: white;
    }

    /* User Record Cards */
    #userTableBody { display: flex; flex-direction: column; gap: 15px; }

    .user-record-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border: var(--border);
      padding: 20px 25px;
      transition: 0.2s;
    }

    .user-record-row:hover {
      background: #fffdf5;
      box-shadow: 5px 5px 0px rgba(0,0,0,0.05);
    }

    .info-group {
      display: grid;
      grid-template-columns: 80px 1fr 2fr 1fr;
      gap: 20px;
      flex: 1;
    }

    .info-item strong {
      display: block;
      font-size: 0.65rem;
      color: #777;
      text-transform: uppercase;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .info-item span {
      font-weight: 600;
      font-size: 0.95rem;
      word-break: break-all;
    }

    /* Buttons */
    .btn-primary {
      background: var(--dark);
      color: white;
      border: var(--border);
      padding: 10px 20px;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
    }

    .btn-warning {
      background: #ffcc00;
      border: 1px solid #111;
      cursor: pointer;
      padding: 6px 15px;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.75rem;
    }

    .btn-danger {
      background: #ff4444;
      border: 1px solid #111;
      color: white;
      cursor: pointer;
      padding: 6px 15px;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.75rem;
    }

    .actions {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <a href="/" class="home-link">← BACK TO DASHBOARD</a>

  <div class="inventory-header">
    <h1>USER DIRECTORY</h1>
    <a href="user_form.html"><button class="btn-primary">ADD NEW USER</button></a>
  </div>

  <div class="top-bar">
    <input type="text" id="search" placeholder="Search by username...">
  </div>

  <div class="sort-bar">
    <strong>SORT BY:</strong>
    <button id="sortBtnid">ID</button>
    <button id="sortBtnUsername">Username</button>
    <button id="sortBtnMail">Email</button>
    <button id="sortBtnPassword">Security</button>
  </div>

  <div id="userTableBody"></div>
</div>

<script>
  let allUsers = [];
  let sortState = { field: 'userID', ascending: true };

  async function loadUsers() {
    const response = await fetch('/api/users');
    const users = await response.json();
    allUsers = users;
    sortState = { field: 'userID', ascending: true };
    sortAndShow(allUsers);
  }

  function showUsers(users) {
    let html = '';
    for (let user of users) {
      // Obscuring password slightly for the UI list
      const maskedPass = "••••••••";

      html += `
        <div class="user-record-row">
            <div class="info-group">
                <div class="info-item">
                    <strong>ID</strong>
                    <span>#${user.userID}</span>
                </div>
                <div class="info-item">
                    <strong>Username</strong>
                    <span>${user.username}</span>
                </div>
                <div class="info-item">
                    <strong>Email Address</strong>
                    <span>${user.userMail}</span>
                </div>
                <div class="info-item">
                    <strong>Password</strong>
                    <span>${maskedPass}</span>
                </div>
            </div>
            <div class="actions">
                <a href="user_form.html?id=${user.userID}"><button class="btn-warning">Edit</button></a>
                <button class="btn-danger" onclick="deleteUser(${user.userID})">Delete</button>
            </div>
        </div>`;
    }
    document.getElementById('userTableBody').innerHTML = html;
  }

  function sortUsers(field) {
    if (sortState.field === field) {
      sortState.ascending = !sortState.ascending;
    } else {
      sortState.field = field;
      sortState.ascending = true;
    }
    sortAndShow(allUsers);
  }

  function sortAndShow(users) {
    users.sort((a, b) => {
      let aVal = a[sortState.field];
      let bVal = b[sortState.field];

      if (aVal === undefined || aVal === null) aVal = '';
      if (bVal === undefined || bVal === null) bVal = '';

      if (typeof aVal === 'string') {
        aVal = aVal.toLowerCase();
        bVal = bVal.toLowerCase();
        return sortState.ascending ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
      } else {
        return sortState.ascending ? aVal - bVal : bVal - aVal;
      }
    });
    showUsers(users);
  }

  async function deleteUser(id) {
    if(confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
      await fetch(`/api/users/${id}`, {method: 'DELETE'});
      loadUsers();
    }
  }

  document.getElementById('sortBtnid').addEventListener('click', () => sortUsers('userID'));
  document.getElementById('sortBtnUsername').addEventListener('click', () => sortUsers('username'));
  document.getElementById('sortBtnMail').addEventListener('click', () => sortUsers('userMail'));
  document.getElementById('sortBtnPassword').addEventListener('click', () => sortUsers('password'));

  document.getElementById('search').addEventListener('keyup', async (e) => {
    const res = await fetch(`/api/users/search/username?username=${e.target.value}`);
    const users = await res.json();
    allUsers = users;
    sortAndShow(allUsers);
  });

  loadUsers();
</script>
</body>
</html>
