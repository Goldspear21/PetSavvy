<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Account Form</title>
  <style>
    :root {
      --accent: #E5E4E2;
      --dark: #111;
      --border: 2px solid #111;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      padding: 60px 20px;
      color: var(--dark);
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: white;
      border: var(--border);
      padding: 40px;
      box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
    }

    h1 {
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: var(--border);
      padding-bottom: 15px;
      margin-bottom: 30px;
      text-align: center;
      font-size: 1.5rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      text-transform: uppercase;
      font-size: 0.7rem;
      font-weight: 800;
      color: #666;
      letter-spacing: 1px;
    }

    input {
      padding: 12px;
      border: var(--border);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      background-color: #fffdf5;
      border-color: #555;
    }

    /* Styling for the read-only or ID display if needed */
    .id-display {
      background-color: #eee;
      color: #777;
      cursor: not-allowed;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 10px;
    }

    .btn {
      flex: 1;
      padding: 15px;
      border: var(--border);
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: 0.2s;
      text-decoration: none;
      text-align: center;
      font-size: 0.9rem;
    }

    .btn-success {
      background: var(--dark);
      color: white;
    }

    .btn-success:hover {
      background: #333;
    }

    .btn-secondary {
      background: white;
      color: var(--dark);
    }

    .btn-secondary:hover {
      background: #eee;
    }

    .home-link {
      display: block;
      margin-bottom: 20px;
      text-decoration: none;
      color: #777;
      font-weight: bold;
      font-size: 0.8rem;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="container">
  <a href="/" class="home-link">← Home</a>
  <h1 id="title">Add User</h1>

  <form id="userForm">
    <div class="form-group" id="idGroup" style="display: none;">
      <label>User ID</label>
      <input type="number" id="userID" class="id-display" readonly>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" required placeholder="Enter username">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="userMail" required placeholder="user@petsavvy.com">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="••••••••">
    </div>

    <div class="button-group">
      <button type="submit" class="btn btn-success">Save User</button>
      <a href="user_table.html" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const userIDParam = params.get('id');

  async function loadUser() {
    if (userIDParam) {
      document.getElementById('title').textContent = 'Edit User';
      document.getElementById('idGroup').style.display = 'flex';

      const response = await fetch(`/api/users/${userIDParam}`);
      const user = await response.json();

      document.getElementById('userID').value = user.userID;
      document.getElementById('username').value = user.username;
      document.getElementById('userMail').value = user.userMail;
      document.getElementById('password').value = user.password;
    }
  }

  document.getElementById('userForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const user = {
      username: document.getElementById('username').value,
      password: document.getElementById('password').value,
      userMail: document.getElementById('userMail').value,
    };

    const url = userIDParam ? `/api/users/${userIDParam}` : '/api/users';
    const method = userIDParam ? 'PUT' : 'POST';

    await fetch(url, {
      method: method,
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(user)
    });

    window.location.href = 'user_table.html';
  });

  loadUser();
</script>

</body>
</html>
