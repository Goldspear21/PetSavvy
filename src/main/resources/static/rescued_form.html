<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rescued Animal Form</title>
    <style>
        :root {
            --accent: #E5E4E2;
            --dark: #111;
            --border: 2px solid #111;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f9f9f9;
            padding: 60px 20px;
            color: var(--dark);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border: var(--border);
            padding: 40px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: var(--border);
            padding-bottom: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 800;
            color: #666;
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="date"],
        select {
            padding: 12px;
            border: var(--border);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: background 0.2s;
        }

        input:focus {
            background-color: #fffdf5;
        }

        .checkbox-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 10px 0;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            border: 1px solid #ddd;
            padding: 10px;
            transition: 0.2s;
        }

        .checkbox-container:hover {
            background: #f0f0f0;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--dark);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: var(--border);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
            text-decoration: none;
            text-align: center;
        }

        .btn-success {
            background: var(--dark);
            color: white;
        }

        .btn-success:hover { background: #333; }

        .btn-secondary {
            background: white;
            color: var(--dark);
        }

        .btn-secondary:hover { background: #eee; }

        .home-link {
            display: block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #777;
            font-weight: bold;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="home-link">← HOME</a>
    <h1 id="title">Add Rescue</h1>

    <form id="rescuedForm">
        <div class="form-group">
            <label>Rescue Name</label>
            <input type="text" id="rescuedName" required placeholder="Animal name">
        </div>

        <div class="form-group">
            <label>Rescue Location</label>
            <input type="text" id="rescueLocation" required placeholder="Where was it found?">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>Date of Rescue</label>
                <input type="date" id="rescueDate" required>
            </div>

            <div class="form-group">
                <label>Species</label>
                <input type="text" id="species" required placeholder="e.g. Dog, Cat">
            </div>
        </div>

        <div class="checkbox-row">
            <label class="checkbox-container">
                <input type="checkbox" id="rescueVaccinated">
                <span>Vaccinated</span>
            </label>

            <label class="checkbox-container">
                <input type="checkbox" id="cuteness">
                <span>Cuteness</span>
            </label>
        </div>

        <div class="button-group">
            <button type="submit" class="btn btn-success">Save Record</button>
            <a href="rescued_table.html" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const tagID = params.get('id');

    async function loadRescueF() {
        if (tagID) {
            document.getElementById('title').textContent = 'Edit Rescue';
            const res = await fetch(`/api/RescuedAnimals/${tagID}`);
            const rescue = await res.json();

            document.getElementById('rescuedName').value = rescue.rescuedName;
            document.getElementById('rescueLocation').value = rescue.rescueLocation;
            document.getElementById('rescueDate').value = rescue.rescueDate;
            document.getElementById('species').value = rescue.species;

            // Fixed: Use .checked for checkboxes
            document.getElementById('rescueVaccinated').checked = rescue.vaccination;
            document.getElementById('cuteness').checked = rescue.cuteness;
        }
    }

    document.getElementById('rescuedForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const rescue = {
            rescuedName: document.getElementById('rescuedName').value,
            rescueLocation: document.getElementById('rescueLocation').value,
            rescueDate: document.getElementById('rescueDate').value,
            species: document.getElementById('species').value,
            vaccination: document.getElementById('rescueVaccinated').checked,
            cuteness: document.getElementById('cuteness').checked
        };

        const url = tagID ? `/api/RescuedAnimals/${tagID}` : '/api/RescuedAnimals';
        const method = tagID ? 'PUT' : 'POST';

        await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(rescue)
        });

        window.location.href = 'rescued_table.html';
    });

    loadRescueF();
</script>
</body>
</html>
