<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            color: #111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Minimalist Navigation */
        nav {
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        nav a {
            display: block;
            color: #333;
            text-align: center;
            padding: 16px 24px;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 0.5px;
            transition: background-color 0.2s;
        }

        nav a:hover {
            background-color: #eeeeee;
            color: #000;
        }

        /* Main Container */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* Basic Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 60px;
        }

        .hero h1 {
            font-size: 3em;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 1.2em;
            color: #666;
        }

        /* High-Contrast Monochrome Cards */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 900px;
        }

        .card {
            background: #ffffff;
            border: 2px solid #111;
            padding: 40px 30px;
            text-align: center;
            text-decoration: none;
            color: #111;
            max-width: 400px;
            margin: 0 auto;
        }

        .card h2 {
            font-size: 1.8em;
            margin-bottom: 15px;
        }

        .card p {
            font-size: 1em;
            line-height: 1.5;
            /* Inherits color so it inverts cleanly on hover */
        }

        /* Login form specific */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 1em;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #111;
            color: #fff;
            border: none;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: #333;
        }

        /* Simple Footer */
        footer {
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            color: #666;
            text-align: center;
            padding: 24px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.2em;
            }
            nav ul {
                flex-direction: column;
            }
            nav a {
                border-bottom: 1px solid #f0f0f0;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="hero">
            <h1>Login</h1>
            <p>Access your Petshop Management account.</p>
        </div>
        <div class="card">
            <h2>Welcome Back</h2>
            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Sign In</button>
            </form>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Petshop Management System. All rights reserved.</p>
    </footer>
</body>
</html>
